name: Build releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          arch: "win64_mingw"
      - name: Build Windows release
        shell: pwsh
        run: |
          $qt = Split-Path (Get-Command qmake.exe).Source -Parent | Split-Path -Parent
          $mingw = Split-Path (Get-Command g++.exe).Source -Parent | Split-Path -Parent
          .\scripts\Build-WindowsRelease.ps1 `
            -QtDirectory $qt `
            -MinGwDirectory $mingw `
            -NinjaDirectory (Split-Path (Get-Command ninja.exe).Source -Parent) `
            -SkipSigning
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*.zip

  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ qt6-base-dev qt6-base-dev-tools
      - name: Build Linux releases
        run: bash scripts/build-linux-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-releases
          path: |
            dist/*.deb
            dist/*.tar.gz

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" artifacts/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" artifacts/* --generate-notes
          fi
